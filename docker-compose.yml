services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 5s
      retries: 5

  cache:
    image: valkey/valkey:7
    command: >
      valkey-server --save "" --appendonly no
      --notify-keyspace-events Ex
      --loglevel notice
      --requirepass admin123
    ports:
      - "6379:6379"

  db:
    image: postgres:17
    shm_size: 128mb
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 20s
      timeout: 5s
      retries: 6
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: fragment-composer
    ports:
      - "5432:5432"

  client-migration:
    image: oven/bun:alpine
    volumes:
      - ./client:/app
    working_dir: /app
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: >
      sh -c "
        export DATABASE_URL='postgresql://dev:admin123@db:5432/video-editor?schema=public'
        bunx prisma migrate deploy
      "
    depends_on:
      db:
        condition: service_healthy
    profiles: [client, full]

  fragment-composer-migration:
    image: oven/bun:alpine
    volumes:
      - ./fragment-composer:/app
    working_dir: /app
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    command: >
      sh -c "
        export DATABASE_URL='postgresql://dev:admin123@db:5432/video-editor?schema=public'
        bunx prisma migrate deploy
      "
    depends_on:
      db:
        condition: service_healthy
    profiles: [fragment-composer, full]

  client:
    image: stijnklomp/client:latest
    depends_on:
      client-migration:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      RABBIT_HOST: rabbitmq
      DATABASE_URL: "postgresql://dev:admin123@db:5432/video-editor?schema=public"
      FRAGMENT_COMPOSER_URL: "http://fragment-composer:3001"
      JWT_SECRET: "dev-jwt-secret-shared-between-services-at-least-32-chars"
    profiles: [client, full]

  fragment-composer:
    image: stijnklomp/fragment-composer:latest
    depends_on:
      rabbitmq:
        condition: service_started
      cache:
        condition: service_started
      fragment-composer-migration:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    environment:
      CACHE_HOST: cache
      DEPLOYMENT_MODE: api
      RABBIT_HOST: rabbitmq
      DATABASE_URL: "postgresql://dev:admin123@db:5432/video-editor?schema=public"
      JWT_SECRET: "dev-jwt-secret-shared-between-services-at-least-32-chars"
    profiles: [fragment-composer, full]

    # TODO: Add fragment-composer worker

networks:
  default:
    name: platform
